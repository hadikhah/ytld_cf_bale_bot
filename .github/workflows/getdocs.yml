name: Mirror Documentation Site

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Bale chat ID'
        required: true
      docs_url:
        description: 'Base URL of the docs'
        required: true
      title:
        description: 'Site name (for zip filename)'
        default: 'docs-mirror'

jobs:
  mirror-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5            # short overall timeout – we kill wget earlier anyway

    steps:
      - uses: actions/checkout@v4

      - name: Mirror site with wget (time-limited)
        env:
          DOCS_URL: ${{ inputs.docs_url }}
          TITLE: ${{ inputs.title }}
        run: |
          SAFE_TITLE=$(echo "$TITLE" | tr -d '\\/*?:"<>|' | cut -c1-40)
          mkdir -p "mirror/$SAFE_TITLE"
          cd "mirror/$SAFE_TITLE"

          # Crawl only 2 levels deep, stay on the same domain, stop after 120 seconds
          timeout 120 wget \
            --recursive \
            --level=2 \
            --domains=$(echo "$DOCS_URL" | sed -E 's#^https?://([^/]+).*#\1#') \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --execute robots=off \
            --no-verbose \
            --wait=0.2 \
            --random-wait \
            --tries=2 \
            --timeout=10 \
            --reject='*.exe,*.dll,*.bat,*.sh,*.cgi,*.php,*.py' \
            --limit-rate=500k \
            "$DOCS_URL" || true
          echo "wget finished (or was interrupted after 120s)"

      - name: Zip and send
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          TITLE: ${{ inputs.title }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          SAFE_TITLE=$(echo "$TITLE" | tr -d '\\/*?:"<>|' | cut -c1-40)
          ZIP_NAME="${SAFE_TITLE}.zip"

          # Zip whatever we downloaded
          if [ -d "mirror/$SAFE_TITLE" ] && [ -n "$(ls -A mirror/$SAFE_TITLE 2>/dev/null)" ]; then
            cd mirror
            zip -r "../${ZIP_NAME}" "$SAFE_TITLE"
            cd ..
          else
            # No files – notify user
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ Mirroring failed – nothing was downloaded.\", \"parse_mode\": \"Markdown\"}"
            echo "No files to zip"
            exit 0
          fi

          ZIP_SIZE=$(stat -c%s "$ZIP_NAME")
          MAX_SIZE=$((20 * 1024 * 1024))

          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"$1\", \"parse_mode\": \"Markdown\"}"
          }

          try_upload() {
            local file="$1"; local caption="$2"
            for attempt in 1 2; do
              if [ -n "$caption" ]; then
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" -F "caption=$caption" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              else
                RESPONSE=$(curl -s -w "%{http_code}" -F "document=@$file" \
                           "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")
              fi
              HTTP_CODE=$(echo "$RESPONSE" | tail -c 4)
              BODY=$(echo "$RESPONSE" | head -c -4)
              if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then return 0; fi
              [ $attempt -lt 2 ] && sleep 1
            done
            return 1
          }

          if [ "$ZIP_SIZE" -le "$MAX_SIZE" ]; then
            if try_upload "$ZIP_NAME" "$ZIP_NAME"; then
              send_message "✅ *Documentation mirrored (up to depth 2):* \`$ZIP_NAME\`\n\n📱 Extract and open any \`.html\` file to browse offline."
            else
              send_message "❌ Bale is unstable – unable to send file."
              exit 0
            fi
          else
            send_message "⚠️ Mirror too large – splitting into parts..."
            rm "$ZIP_NAME"
            cd mirror
            zip -s 15m "../${ZIP_NAME}" "$SAFE_TITLE"
            cd ..
            PARTS=$(ls "${SAFE_TITLE}.z"* "${SAFE_TITLE}.zip" 2>/dev/null | sort -V)
            for part in $PARTS; do
              if ! try_upload "$part"; then
                send_message "❌ Bale interrupted – could not send all parts."
                exit 0
              fi
              sleep 1
            done
            send_message "✅ *Documentation mirrored (split archive).* Extract and browse offline."
          fi

      - name: Unlock worker queue
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          CHAT_ID: ${{ inputs.chat_id }}
        run: |
          if [ -n "$WORKER_URL" ] && [ -n "$WORKER_SECRET" ]; then
            curl -s -X POST "$WORKER_URL/github/done" \
                 -H "Content-Type: application/json" \
                 -d "{\"secret\": \"$WORKER_SECRET\", \"chat_id\": \"$CHAT_ID\"}"
          fi
